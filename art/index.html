<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jukes World — Art</title>
  <meta name="description" content="A gallery view of artwork from Jukes World." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .gallery-shell {
      display: grid;
      gap: 26px;
    }

    .gallery-hero {
      border-radius: 24px;
      padding: 28px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
    }

    .gallery-hero p {
      max-width: 40rem;
      margin-bottom: 16px;
      opacity: 0.85;
    }

    .gallery-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .gallery-subtle-link {
      color: inherit;
      text-decoration: none;
      opacity: 0.84;
      border-bottom: 1px solid rgba(255,255,255,0.24);
      padding-bottom: 2px;
    }

    .gallery-subtle-link:hover {
      opacity: 1;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .gallery-piece {
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .gallery-piece:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.18);
      box-shadow: 0 16px 40px rgba(0,0,0,0.16);
    }

    .gallery-piece a {
      width: 100%;
      color: inherit;
      text-decoration: none;
      display: block;
    }

    .gallery-image-wrap {
      position: relative;
      width: 100%;
      overflow: hidden;
      aspect-ratio: 1 / 1;
      background: rgba(255,255,255,0.04);
    }

    .gallery-piece img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.25s ease;
    }

    .gallery-piece:hover img {
      transform: scale(1.02);
    }

    .gallery-chip {
      position: absolute;
      right: 12px;
      bottom: 12px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(9, 9, 12, 0.72);
      backdrop-filter: blur(10px);
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .gallery-piece figcaption {
      padding: 14px 16px 18px;
    }

    .gallery-piece h3 {
      margin: 0 0 6px;
      font-size: 1.02rem;
    }

    .gallery-piece p {
      margin: 0;
      opacity: 0.75;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    @media (max-width: 760px) {
      .gallery-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="art-page">
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand-lockup" href="/">
        <div class="brand-mark brand-mark-image">
          <img src="/assets/images/jukesworld-logo.png" alt="Jukes World logo" />
        </div>
        <div class="brand-text">
          <strong>Jukes World</strong>
          <span>Art branch</span>
        </div>
      </a>

      <button class="menu-toggle" type="button" aria-expanded="false" data-menu-toggle>Menu</button>

      <nav class="main-nav" aria-label="Primary" data-nav>
        <a href="/">Home</a>
        <a href="/music/">Music</a>
        <a class="active" href="/art/">Art</a>
        <a href="/about/">About</a>
        <a href="/contact/">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="container gallery-shell">
        <div class="gallery-hero">
          <span class="eyebrow">Gallery</span>
          <h1>Artwork from Jukes World.</h1>
          <p>
            Settle in
          </p>

          <div class="gallery-links">
            <a class="button button-secondary" href="https://www.instagram.com/thelastjuke/" target="_blank" rel="noopener noreferrer">Visit the Art Instagram</a>
            <a class="gallery-subtle-link" href="https://www.instagram.com/thelastjuke/" target="_blank" rel="noopener noreferrer">@thelastjuke</a>
          </div>
        </div>

        <section aria-label="Art gallery">
          <div class="gallery-grid">
            <figure class="gallery-piece">
              <a href="https://www.instagram.com/thelastjuke/" target="_blank" rel="noopener noreferrer" aria-label="View more art on Instagram">
                <div class="gallery-image-wrap">
                  <img
                    src="/assets/images/tennis-serve-process.png"
                    alt="Love"
                  />
                  <span class="gallery-chip">View on Instagram</span>
                </div>
                <figcaption>
                  <h3>"Love"</h3>
                  <p>Tennis Serve Study</p>
                </figcaption>
              </a>
            </figure>

            <figure class="gallery-piece">
              <a href="https://www.instagram.com/thelastjuke/" target="_blank" rel="noopener noreferrer" aria-label="View more art on Instagram">
                <div class="gallery-image-wrap">
                  <img
                    src="/assets/images/smh-collage.png"
                    alt="Peg Leg and Co."
                  />
                  <span class="gallery-chip">View on Instagram</span>
                </div>
                <figcaption>
                  <h3>Peg Leg and Co.</h3>
                  <p>Layered character mash-up.</p>
                </figcaption>
              </a>
            </figure>

            <figure class="gallery-piece">
              <a href="https://www.instagram.com/thelastjuke/" target="_blank" rel="noopener noreferrer" aria-label="View more art on Instagram">
                <div class="gallery-image-wrap">
                  <img
                    src="/assets/images/gordon-digital.png"
                    alt="Yes Chef"
                  />
                  <span class="gallery-chip">View on Instagram</span>
                </div>
                <figcaption>
                  <h3>Yes Chef</h3>
                  <p>Portrait Study</p>
                </figcaption>
              </a>
            </figure>

            <figure class="gallery-piece">
              <a href="https://www.instagram.com/thelastjuke/" target="_blank" rel="noopener noreferrer" aria-label="View more art on Instagram">
                <div class="gallery-image-wrap">
                  <img
                    src="/assets/images/boy-in-water.png"
                    alt="Dippin"
                  />
                  <span class="gallery-chip">View on Instagram</span>
                </div>
                <figcaption>
                  <h3>Dippin</h3>
                  <p>Quiet tension and environmental mood.</p>
                </figcaption>
              </a>
            </figure>
          </div>
        </section>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-grid">
      <div>
        <div class="brand-lockup">
          <div class="brand-mark brand-mark-image">
            <img src="/assets/images/jukesworld-logo.png" alt="Jukes World logo" />
          </div>
          <div class="brand-text">
            <strong>Jukes World</strong>
            <span>Art branch</span>
          </div>
        </div>
        <p>Gallery mode for now.</p>
      </div>

      <div>
        <h4>Browse</h4>
        <div class="footer-links">
          <a href="/">Home</a>
          <a href="/music/">Music</a>
          <a href="/about/">About</a>
          <a href="/contact/">Contact</a>
        </div>
      </div>

      <div>
        <h4>Follow</h4>
        <div class="footer-links">
          <a href="https://www.instagram.com/thelastjuke/" target="_blank" rel="noopener noreferrer">Art Instagram</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="/script.js"></script>
</body>
</html>
