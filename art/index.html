<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jukes World — Art</title>
  <meta name="description" content="A gallery view of artwork from Jukes World." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .gallery-shell {
      display: grid;
      gap: 26px;
    }

    .gallery-hero {
      border-radius: 24px;
      padding: 28px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
    }

    .gallery-hero p {
      max-width: 40rem;
      margin-bottom: 0;
      opacity: 0.85;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .gallery-piece {
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
    }

    .gallery-piece button {
      width: 100%;
      border: 0;
      background: transparent;
      color: inherit;
      padding: 0;
      cursor: pointer;
      font: inherit;
      text-align: left;
      display: block;
    }

    .gallery-piece img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
    }

    .gallery-piece figcaption {
      padding: 14px 16px 18px;
    }

    .gallery-piece h3 {
      margin: 0 0 6px;
      font-size: 1.02rem;
    }

    .gallery-piece p {
      margin: 0;
      opacity: 0.75;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    @media (max-width: 760px) {
      .gallery-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="art-page">
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand-lockup" href="/">
        <div class="brand-mark brand-mark-image">
          <img src="/assets/images/jukesworld-logo.png" alt="Jukes World logo" />
        </div>
        <div class="brand-text">
          <strong>Jukes World</strong>
          <span>Art branch</span>
        </div>
      </a>

      <button class="menu-toggle" type="button" aria-expanded="false" data-menu-toggle>Menu</button>

      <nav class="main-nav" aria-label="Primary" data-nav>
        <a href="/">Home</a>
        <a href="/music/">Music</a>
        <a class="active" href="/art/">Art</a>
        <a href="/about/">About</a>
        <a href="/contact/">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="container gallery-shell">
        <div class="gallery-hero">
          <span class="eyebrow">Gallery</span>
          <h1>Artwork from Jukes World.</h1>
          <p>
            Settle in
          </p>
        </div>

        <section aria-label="Art gallery">
          <div class="gallery-grid">
            <figure class="gallery-piece">
              <button
                type="button"
                data-lightbox-image="/assets/images/tennis-serve-process.png"
                data-lightbox-alt="Love"
              >
                <img
                  src="/assets/images/tennis-serve-process.png"
                  alt="Digital tennis illustration showing a player mid-serve"
                />
                <figcaption>
                  <h3>"Love"</h3>
                  <p>Tennis Serve Study</p>
                </figcaption>
              </button>
            </figure>

            <figure class="gallery-piece">
              <button
                type="button"
                data-lightbox-image="/assets/images/smh-collage.png"
                data-lightbox-alt="Peg Leg and Co."
              >
                <img
                  src="/assets/images/smh-collage.png"
                  alt="Digital collage illustration featuring anime-inspired characters"
                />
                <figcaption>
                  <h3>Peg Leg and Co.</h3>
                  <p>Layered character mash-up.</p>
                </figcaption>
              </button>
            </figure>

            <figure class="gallery-piece">
              <button
                type="button"
                data-lightbox-image="/assets/images/gordon-digital.png"
                data-lightbox-alt="Digital illustration portrait of Gordon Ramsay"
              >
                <img
                  src="/assets/images/gordon-digital.png"
                  alt="Yes Chef"
                />
                <figcaption>
                  <h3>Yes Chef</h3>
                  <p>Portrait Study</p>
                </figcaption>
              </button>
            </figure>

            <figure class="gallery-piece">
              <button
                type="button"
                data-lightbox-image="/assets/images/boy-in-water.png"
                data-lightbox-alt="Dippin"
              >
                <img
                  src="/assets/images/boy-in-water.png"
                  alt="Digital illustration of a boy in water between wooden posts"
                />
                <figcaption>
                  <h3>Dippin</h3>
                  <p>Quiet tension and environmental mood.</p>
                </figcaption>
              </button>
            </figure>
          </div>
        </section>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-grid">
      <div>
        <div class="brand-lockup">
          <div class="brand-mark brand-mark-image">
            <img src="/assets/images/jukesworld-logo.png" alt="Jukes World logo" />
          </div>
          <div class="brand-text">
            <strong>Jukes World</strong>
            <span>Art branch</span>
          </div>
        </div>
        <p>Gallery mode for now.</p>
      </div>

      <div>
        <h4>Browse</h4>
        <div class="footer-links">
          <a href="/">Home</a>
          <a href="/music/">Music</a>
          <a href="/about/">About</a>
          <a href="/contact/">Contact</a>
        </div>
      </div>

      <div>
        <h4>Status</h4>
        <small>More collections and print layers can come later without changing the gallery base.</small>
      </div>
    </div>
  </footer>

  <script src="/script.js"></script>
</body>
</html>
